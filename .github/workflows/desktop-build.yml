name: Build Desktop Remote

on:
  push:
  workflow_dispatch:

jobs:
  build:
    name: Build ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [windows-latest, macos-latest]
    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: 8.10.2

      - name: Clean build
        run: gradle clean build packageNative --no-daemon --stacktrace

      - name: Upload jar
        uses: actions/upload-artifact@v4
        with:
          name: JLXC-Teleprompter-Desktop-Remote-jar-${{ matrix.os }}
          path: build/libs/*.jar

      - name: Upload app image
        uses: actions/upload-artifact@v4
        with:
          name: JLXC-Teleprompter-Desktop-Remote-app-${{ matrix.os }}
          path: build/jpackage/**
